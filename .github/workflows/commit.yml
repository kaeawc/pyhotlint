name: "Commit"

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'
  workflow_call:

permissions:
  checks: write
  contents: read

jobs:
  compile-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: "Compile pyhotlint"
        run: go build ./cmd/pyhotlint/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: "Install gotestsum"
        run: go install gotest.tools/gotestsum@latest
      - name: "Run Go tests"
        run: gotestsum --junitfile junit-report.xml --format standard-verbose ./...
      - name: "Check if test reports were created"
        id: junit-reports-exist
        uses: andstor/file-existence-action@v3
        with:
          files: "junit-report.xml"
      - name: "Publish Test Report"
        uses: mikepenz/action-junit-report@v6
        if: steps.junit-reports-exist.outputs.files_exists == 'true'
        with:
          report_paths: 'junit-report.xml'

  complexity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: "Install gocyclo"
        run: go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
      - name: "Run gocyclo"
        run: gocyclo -over 12 -ignore '_test\.go$' .

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: "Install golangci-lint v2"
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: "Run golangci-lint"
        run: golangci-lint run

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: "Install gosec"
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: "Run gosec"
        run: gosec -exclude=G104,G304 -fmt=junit-xml -out=gosec-report.xml -stdout ./...
      - name: "Check if security report was created"
        id: gosec-report-exists
        uses: andstor/file-existence-action@v3
        with:
          files: "gosec-report.xml"
      - name: "Publish Security Report"
        uses: mikepenz/action-junit-report@v6
        if: steps.gosec-report-exists.outputs.files_exists == 'true'
        with:
          report_paths: 'gosec-report.xml'
