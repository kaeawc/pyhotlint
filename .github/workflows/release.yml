name: "Release"

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-13 is the last x86 default; -latest is now arm64.
          - os: macos-13
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          # linux-arm64 needs cross-compile toolchain or an arm64
          # runner; tracked separately.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Build
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF##refs/tags/}"
          name="pyhotlint-${tag}-${GOOS}-${GOARCH}"
          stage="dist/${name}"
          mkdir -p "${stage}"
          go build -ldflags "-s -w -X main.version=${tag}" -o "${stage}/pyhotlint" ./cmd/pyhotlint/
          cp README.md LICENSE "${stage}/"
          (cd dist && tar czf "${name}.tar.gz" "${name}")
          (cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256")

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pyhotlint-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
